<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>הוספת משימה תקופתית</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding: 2rem 1rem;
    direction: rtl;
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .header {
    background: #1a73e8;
    color: white;
    padding: 1.5rem 2rem;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 13px;
    opacity: 0.85;
  }

  .form-body {
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 14px;
    font-weight: 500;
    color: #333;
  }

  label .required {
    color: #e53935;
    margin-right: 2px;
  }

  .hint {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  input[type="text"],
  input[type="email"],
  input[type="date"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    direction: rtl;
    transition: border-color 0.2s;
    background: #fafafa;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #1a73e8;
    background: #fff;
  }

  textarea { resize: vertical; min-height: 80px; }

  .radio-group, .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .radio-btn, .check-btn {
    display: none;
  }

  .radio-label, .check-label {
    padding: 8px 16px;
    border: 1.5px solid #ddd;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    background: #fafafa;
    color: #444;
    user-select: none;
  }

  .radio-btn:checked + .radio-label {
    background: #1a73e8;
    border-color: #1a73e8;
    color: white;
    font-weight: 500;
  }

  .check-btn:checked + .check-label {
    background: #e8f0fe;
    border-color: #1a73e8;
    color: #1a73e8;
    font-weight: 500;
  }

  .conditional {
    display: none;
    flex-direction: column;
    gap: 1.2rem;
  }

  .conditional.visible { display: flex; }

  .one-time-banner {
    background: #f3e5f5;
    border: 1.5px solid #ce93d8;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #6a1b9a;
  }

  .divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 0.2rem 0;
  }

  .submit-btn {
    background: #1a73e8;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
    font-family: inherit;
    margin-top: 0.5rem;
  }

  .submit-btn:hover { background: #1557b0; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

  .success-msg {
    display: none;
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    text-align: center;
  }

  .error-msg {
    display: none;
    background: #ffebee;
    color: #c62828;
    border: 1px solid #ef9a9a;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>הוספת משימה תקופתית</h1>
    <p>מרפאת טיפול בחיוך — מערכת ניהול משימות</p>
  </div>

  <div class="form-body">

    <div class="field">
      <label>שם המשימה <span class="required">*</span></label>
      <input type="text" id="task" placeholder="לדוגמה: דוח חודשי שיננית" required>
    </div>

    <div class="field">
      <label>אחראי על המשימה <span class="required">*</span></label>
      <input type="text" id="owner" placeholder="שם מלא" required>
    </div>

    <div class="field">
      <label>מייל האחראי <span class="required">*</span></label>
      <input type="email" id="mail" placeholder="example@email.com" required>
    </div>

    <hr class="divider">

    <div class="field">
      <label>תדירות <span class="required">*</span></label>
      <div class="radio-group">
        <input type="radio" name="freq" id="f-weekly" value="weekly" class="radio-btn">
        <label for="f-weekly" class="radio-label">שבועי</label>

        <input type="radio" name="freq" id="f-monthly" value="monthly" class="radio-btn">
        <label for="f-monthly" class="radio-label">חודשי</label>

        <input type="radio" name="freq" id="f-yearly" value="yearly" class="radio-btn">
        <label for="f-yearly" class="radio-label">שנתי</label>

        <input type="radio" name="freq" id="f-interval" value="interval" class="radio-btn">
        <label for="f-interval" class="radio-label">אינטרוול</label>

        <input type="radio" name="freq" id="f-one-time" value="one_time" class="radio-btn">
        <label for="f-one-time" class="radio-label">חד פע
